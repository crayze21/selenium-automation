[pytest]
# =============================================================================
# pytest.ini  –  Toreja Medical Clinic PMS test suite
# =============================================================================

# Root directory (where pytest collects tests)
testpaths = tests

# Verbose output + short traceback format
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

# Display a summary of slow tests (top 10)
# addopts = ... --durations=10

# Custom markers (avoids PytestUnknownMarkWarning)
markers =
    smoke:      Quick sanity checks — run on every build
    regression: Full regression suite
    login:      Login / auth tests
    dashboard:  Dashboard tests
    patients:   Patient CRUD tests
    prescription: New Prescription tests
    history:    Patient History tests
    medicines:  Medicines CRUD tests
    medicine_details: Medicine Details CRUD tests
    reports:    Reports tests
    users:      Users CRUD tests