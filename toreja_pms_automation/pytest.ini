[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s  %(levelname)-8s  %(name)s  %(message)s
log_cli_date_format = %H:%M:%S
log_file = logs/pytest_live.log
log_file_level = DEBUG
log_file_format = %(asctime)s  %(levelname)-8s  %(name)-30s  %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

markers =
    smoke:      fast sanity checks, run on every deploy
    functional: per-module feature coverage, run daily
    regression: edge cases and boundary tests, run before releases
    e2e:        cross-module workflow chains, run on staging